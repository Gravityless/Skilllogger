name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.11']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install server dependencies
        run: python -m pip install --upgrade pip fastapi uvicorn jinja2

      # GitHub Actions runners (ubuntu/macos/windows) all ship pwsh on PATH,
      # so the PS test suite runs on every OS too.
      - name: Show pwsh version
        shell: bash
        run: pwsh -NoProfile -Command "$PSVersionTable.PSVersion" || true

      - name: Run all tests
        shell: bash
        run: python -m unittest discover -s testcase -v
